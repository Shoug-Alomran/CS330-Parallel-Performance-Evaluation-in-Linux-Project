site_name: CS330 Course Project
site_url: https://operating-systems.shoug-tech.com/
copyright: © 2026 Shoug Fawaz Alomran · All rights reserved

theme:
  name: material
  favicon: CS330-logo.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/console-network
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

nav:
  - Home: index.md
  - Project:
      - Overview: Project-Overview/overview.md
      - Requirements: Project-Overview/requirements.md
      - Team: Project-Overview/team.md
      - Repository Structure: Project-Overview/repo-structure.md
  - Phase I:
      - Overview: Phase-1/index.md
      - VM & Linux Setup: Phase-1/setup.md
      - Build & Run: Phase-1/build-run.md
      - Experiment Plan: Phase-1/experiments.md
      - Results: Phase-1/results.md
      - Report: Phase-1/report.md
      - PDF Report: Phase-1/report.pdf
  - Phase II:
      - Overview: Phase-2/index.md
      - Plan: Phase-2/plan.md
      - Work Log: Phase-2/work-log.md
      - Results: Phase-2/results.md
      - Report: Phase-2/report.md
  - Reference:
      - Commands: reference/commands.md
      - Glossary: reference/glossary.md
      - Git Workflow Guide: reference/Git-Workflow-Guide.md
  - Copyright: copyright.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - styles/extra.css

extra_javascript:
  - javascripts/cta-footer.js
