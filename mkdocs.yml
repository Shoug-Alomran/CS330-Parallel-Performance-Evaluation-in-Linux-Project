site_name: CS330 Course Project
site_url: https://operating-systems.shoug-tech.com/
use_directory_urls: true
copyright: © 2026 Shoug Fawaz Alomran · All rights reserved

theme:
  name: material
  custom_dir: overrides
  favicon: CS330-logo.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/console-network
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

nav:
  - Home: index.md
  - Project:
      - Overview: Project-Overview/overview.md
      - Requirements: Project-Overview/requirements.md
      - Team: Project-Overview/team.md
      - Repository Structure: Project-Overview/repo-structure.md
  - Phase I:
      - Overview: Phase-1/index.md
      - VM & Linux Setup: Phase-1/setup.md
      - Build & Run: Phase-1/build-run.md
      - Experiment Plan: Phase-1/experiments.md
      - Results: Phase-1/results.md
      - Report: Phase-1/report.md
  - Phase II:
      - Overview: Phase-2/index.md
      - Plan: Phase-2/plan.md
      - Work Log: Phase-2/work-log.md
      - Results: Phase-2/results.md
      - Report: Phase-2/report.md
  - Reference:
      - Commands: reference/commands.md
      - Glossary: reference/glossary.md
      - Git Workflow Guide: reference/Git-Workflow-Guide.md
  - Copyright: copyright.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - hooks/seo.py

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: ignore
  links:
    not_found: warn
    anchors: warn
    unrecognized_links: warn

extra_css:
  - styles/extra-v2.css

extra_javascript:
  - javascripts/cta-footer-v2.js
  - javascripts/seo.js

extra:
  generator: false
  seo:
    robots_disallow:
      - /search/
      - /*?q=*
      - /*&q=*
      - /*?query=*
      - /*&query=*
      - /*.md$
    legacy_redirects:
      Project-Overview/Phase-1.html: /Phase-1/
      Project-Overview/Phase-2.html: /Phase-2/
      Project-Overview/Phase-1/index.html: /Project-Overview/Phase-1.html
      Project-Overview/Phase-2/index.html: /Project-Overview/Phase-2.html
      Phase-1/report.html: /Phase-1/report/
